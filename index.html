<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ViralEats NYC</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<!-- Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- FILTER BUTTONS -->
<div class="filter-panel">
  <h2>ViralEats NYC</h2>
  <p>NYC Restaurant Week 2026</p>

  <label>Filter by Cuisine:</label>
  <select id="cuisineFilter" onchange="applyFilters()">
    <option value="all">All Cuisines</option>
    <option value="mexican">Mexican</option>
    <option value="italian">Italian</option>
    <option value="middle eastern">Middle Eastern</option>
    <option value="caribbean">Caribbean</option>
    <option value="burgers">Burgers</option>
    <option value="belgian">Belgian</option>
    <option value="japanese/sushi">Japanese/Sushi</option>
    <option value="eastern european">Eastern European</option>
    <option value="colombian">Colombian</option>
    <option value="chinese">Chinese</option>
    <option value="american (traditional)">American (Traditional)</option>
    <option value="vietnamese">Vietnamese</option>
    <option value="southern">Southern</option>
    <option value="australian">Australian</option>
  </select>

  <label>Filter by Viral Level:</label>
  <select id="viewsFilter" onchange="applyFilters()">
    <option value="all">All Popularity</option>
    <option value="low">Under 50k views</option>
    <option value="trending">50k–250k views</option>
    <option value="viral">250k–1M views</option>
    <option value="super">1M+ views</option>
  </select>

  <button onclick="resetFilters()">Reset Filters</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- ✅ MODAL (THIS WAS YOUR BUG BEFORE) -->
<div id="videoModal" class="modal">
  <span class="close" onclick="closeModal()">×</span>
  <div id="carouselWrapper">
    <div id="swipeHint">← Swipe →</div>
    <div id="carousel"></div>
  </div>
</div>

<!-- add restaurant button -->

<script async src="https://tally.so/widgets/embed.js"></script>
<button 
  data-tally-open="yP0oqd" 
  class="fab">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
    <span>Add Restaurant</span>
</button>

<!-- ✅ JS LOADS LAST -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>

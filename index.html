<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ViralEats NYC</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<!-- Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- FILTER BUTTONS -->
<div class="filter-container">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('mexican', this)">Mexican</button>
  <button class="filter-btn" onclick="setFilter('italian', this)">Italian</button>
  <button class="filter-btn" onclick="setFilter('middle eastern', this)">Middle Eastern</button>
  <button class="filter-btn" onclick="setFilter('caribbean', this)">Caribbean</button>
  <button class="filter-btn" onclick="setFilter('burgers', this)">Burgers</button>
  <button class="filter-btn" onclick="setFilter('belgian', this)">Belgian</button>
  <button class="filter-btn" onclick="setFilter('japanese/sushi', this)">Japanese/Sushi</button>
  <button class="filter-btn" onclick="setFilter('eastern european', this)">Eastern European</button>
  <button class="filter-btn" onclick="setFilter('colombian', this)">Colombian</button>
  <button class="filter-btn" onclick="setFilter('chinese', this)">Chinese</button>
  <button class="filter-btn" onclick="setFilter('american (traditional)', this)">American (Traditional)</button>
  <button class="filter-btn" onclick="setFilter('vietnamese', this)">Vietnamese</button>
  <button class="filter-btn" onclick="setFilter('southern', this)">Southern</button>
  <button class="filter-btn" onclick="setFilter('australian', this)">Australian</button>

</div>

<!-- MAP -->
<div id="map"></div>

<!-- ✅ MODAL (THIS WAS YOUR BUG BEFORE) -->
<div id="videoModal" class="modal">
  <span class="close" onclick="closeModal()">×</span>
  <div id="carouselWrapper">
    <div id="swipeHint">← Swipe →</div>
    <div id="carousel"></div>
  </div>
</div>

<!-- add restaurant button -->

<div id="add-btn" class="fab" title="Add a restaurant">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
</div>

<div id="form-overlay" class="overlay">
    <div class="panel">
        <div class="panel-handle"></div>
        <button class="close-panel">&times;</button>
        <div class="panel-content">
            <iframe 
                src="https://tally.so/embed/yP0oqd?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                width="100%" 
                height="100%" 
                frameborder="0">
            </iframe>
        </div>
    </div>
</div>

<!-- ✅ JS LOADS LAST -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
